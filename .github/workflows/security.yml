name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  codeql-and-vulnerability:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9
        with:
          languages: go
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: 1.26.5
          cache-dependency-path: cli/go.sum
      - name: Build for CodeQL
        working-directory: cli
        run: go build ./...
      - name: Go vulnerability database
        working-directory: cli
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...
      - uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9

  scheduled-concurrency-and-fuzz:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: 1.26.5
          cache-dependency-path: cli/go.sum
      - name: Race tests
        working-directory: cli
        run: go test -race ./...
      - name: Fuzz canonical fingerprint parsers
        working-directory: cli
        run: go test ./internal/context -run '^$' -fuzz FuzzFingerprint -fuzztime 15s

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-3.0, AGPL-3.0
