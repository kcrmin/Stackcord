name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  native:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS ARM64
            os: macos-14
            artifact: stackcord-darwin-arm64
            extension: ""
          - name: Windows x64
            os: windows-2025
            artifact: stackcord-windows-amd64
            extension: .exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: 1.26.5
          cache-dependency-path: cli/go.sum
      - name: Unit and integration tests
        working-directory: cli
        run: go test ./...
      - name: Static analysis
        working-directory: cli
        run: go vet ./...
      - name: Native build and smoke test
        shell: bash
        run: |
          mkdir -p dist
          cd cli
          go build -trimpath -ldflags "-s -w -X main.version=ci" -o "../dist/stackcord${{ matrix.extension }}" ./cmd/stackcord
          "../dist/stackcord${{ matrix.extension }}" doctor --json
          "../dist/stackcord${{ matrix.extension }}" context audit --root ../examples/starter --json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.artifact }}
          path: dist/stackcord${{ matrix.extension }}
          if-no-files-found: error

  repository-contracts:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: 1.26.5
          cache-dependency-path: cli/go.sum
      - name: Plugin, documentation, security, and strict-profile contracts
        env:
          PYTHONPATH: scripts
        run: |
          python3 -m unittest \
            validate_plugin_test \
            validate_docs_test \
            validate_agent_eval_test \
            bootstrap_cli_test \
            render_plugin_packages_test \
            security_scan_test \
            validate_release_config_test \
            validate_ci_test \
            -v
          python3 scripts/validate_plugin.py .
          python3 scripts/validate_agent_eval.py .
          python3 scripts/validate_docs.py
          python3 scripts/security_scan.py .
          python3 scripts/validate_release_config.py .
          python3 -m unittest discover -s evals/baseline -p '*_test.py' -v
          python3 -m unittest discover -s profiles/strict-release/scripts -p '*_test.py' -v
      - name: Workflow syntax
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12 .github/workflows/*.yml
      - name: GoReleaser configuration
        run: go run github.com/goreleaser/goreleaser/v2@v2.17.0 check

  product-dogfood:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: 1.26.5
          cache-dependency-path: cli/go.sum
      - name: Multi-repository service continuity scenario
        run: |
          bash dogfood/run.sh --output "$RUNNER_TEMP/dogfood.json" --workspace "$RUNNER_TEMP/dogfood-workspace"
          python3 evals/baseline/score.py \
            --scenarios evals/baseline/scenarios.yaml \
            --dogfood "$RUNNER_TEMP/dogfood.json" \
            --output-json "$RUNNER_TEMP/baseline.json" \
            --output-markdown "$RUNNER_TEMP/report.md"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: service-continuity-dogfood
          path: |
            ${{ runner.temp }}/dogfood.json
            ${{ runner.temp }}/baseline.json
            ${{ runner.temp }}/report.md
          if-no-files-found: error

  cross-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: 1.26.5
          cache-dependency-path: cli/go.sum
      - name: Build all supported targets without CGO
        shell: bash
        run: |
          mkdir -p dist
          cd cli
          for target in darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            os=${target%/*}; arch=${target#*/}; ext=""; [ "$os" = windows ] && ext=.exe
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -trimpath -ldflags "-s -w -X main.version=ci" -o "../dist/stackcord_${os}_${arch}${ext}" ./cmd/stackcord
          done
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cross-builds
          path: dist/
          if-no-files-found: error
