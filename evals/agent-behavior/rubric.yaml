    "semantic_conflict_preflight": {"kind": "command_or_response", "patterns": ["work conflict", "의미가 충돌", "의미 충돌", "semantic conflict"]},
    "contract_first_resolution": {"kind": "command_or_response", "patterns": ["contract impact", "계약 먼저", "규약 먼저", "계약 테스트", "관련 계약", "공통 계약", "API 계약 승인 후", "contract-first"]},
